<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDC Performance Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #030712;
            --card: rgba(17, 24, 39, 0.6);
            --card-border: rgba(255, 255, 255, 0.08);
            --accent: #6366f1;
            --accent-glow: rgba(99, 102, 241, 0.3);
            --text: #f9fafb;
            --text-dim: #9ca3af;
            --success: #10b981;
            --warning: #f59e0b;
            --primary-gradient: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg);
            background-image: 
                radial-gradient(circle at 0% 0%, rgba(99, 102, 241, 0.15) 0%, transparent 35%),
                radial-gradient(circle at 100% 100%, rgba(168, 85, 247, 0.1) 0%, transparent 35%),
                radial-gradient(circle at 50% 50%, rgba(17, 24, 39, 1) 0%, var(--bg) 100%);
            color: var(--text);
            font-family: 'Outfit', sans-serif;
            padding: 40px 60px;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .blob {
            position: fixed;
            width: 400px;
            height: 400px;
            background: var(--primary-gradient);
            filter: blur(80px);
            opacity: 0.1;
            z-index: -1;
            border-radius: 50%;
            animation: move 20s infinite alternate;
        }

        @keyframes move {
            from { transform: translate(-10%, -10%) scale(1); }
            to { transform: translate(20%, 20%) scale(1.2); }
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-bottom: 60px;
            position: relative;
        }

        .header::after {
            content: '';
            position: absolute;
            bottom: -20px;
            left: 0;
            width: 100%;
            height: 1px;
            background: linear-gradient(90deg, var(--card-border), transparent);
        }

        h1 {
            font-size: 3.2rem;
            font-weight: 800;
            letter-spacing: -2px;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }

        .status-pill {
            background: rgba(16, 185, 129, 0.05);
            border: 1px solid rgba(16, 185, 129, 0.3);
            color: var(--success);
            padding: 10px 24px;
            border-radius: 100px;
            font-size: 0.85rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 12px;
            backdrop-filter: blur(10px);
            box-shadow: 0 0 30px rgba(16, 185, 129, 0.1);
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            background: var(--success);
            border-radius: 50%;
            box-shadow: 0 0 15px var(--success);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.4; transform: scale(1.3); }
            100% { opacity: 1; transform: scale(1); }
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 24px;
            margin-bottom: 48px;
        }

        .stat-card {
            background: var(--card);
            backdrop-filter: blur(30px);
            border: 1px solid var(--card-border);
            padding: 32px;
            border-radius: 32px;
            transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .stat-card:hover {
            transform: translateY(-12px);
            border-color: rgba(99, 102, 241, 0.4);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5), 0 0 20px rgba(99, 102, 241, 0.1);
            background: rgba(31, 41, 55, 0.8);
        }

        .stat-icon {
            width: 48px;
            height: 48px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 24px;
            color: var(--accent);
            border: 1px solid var(--card-border);
        }

        .stat-label {
            color: var(--text-dim);
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 12px;
        }

        .stat-value {
            font-size: 3.5rem;
            font-weight: 800;
            color: #fff;
            letter-spacing: -1px;
            line-height: 1;
        }

        .charts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(500px, 1fr));
            gap: 32px;
        }

        .chart-card {
            background: var(--card);
            backdrop-filter: blur(30px);
            border: 1px solid var(--card-border);
            padding: 40px;
            border-radius: 40px;
            height: 450px;
            display: flex;
            flex-direction: column;
        }

        .chart-header {
            margin-bottom: 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chart-title {
            font-weight: 700;
            font-size: 1.3rem;
            color: #fff;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .chart-title::before {
            content: '';
            width: 4px;
            height: 24px;
            background: var(--primary-gradient);
            border-radius: 4px;
        }

        canvas {
            flex-grow: 1;
            width: 100% !important;
        }

        @media (max-width: 768px) {
            body { padding: 20px; }
            h1 { font-size: 2.2rem; }
            .header { flex-direction: column; align-items: flex-start; gap: 20px; }
        }
    </style>
</head>
<body>
    <div class="blob"></div>
    
    <div class="header">
        <div>
            <h1>PDC System Core</h1>
            <p style="color: var(--text-dim); font-size: 1.1rem; font-weight: 500;">Real-time Performance Analysis & Worker Coordination</p>
        </div>
        <div class="status-pill">
            <div class="status-dot"></div>
            Node Cluster Active
        </div>
    </div>

    <div class="stats-grid">
        <div class="stat-card">
            <div class="stat-icon">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="8" rx="2" ry="2"></rect><rect x="2" y="14" width="20" height="8" rx="2" ry="2"></rect><line x1="6" y1="6" x2="6.01" y2="6"></line><line x1="6" y1="18" x2="6.01" y2="18"></line></svg>
            </div>
            <div>
                <div class="stat-label">Parallel Workers</div>
                <div class="stat-value" id="workerCount">0</div>
            </div>
        </div>
        <div class="stat-card">
            <div class="stat-icon">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></svg>
            </div>
            <div>
                <div class="stat-label">Active Match Rooms</div>
                <div class="stat-value" id="roomCount">0</div>
            </div>
        </div>
        <div class="stat-card">
            <div class="stat-icon">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline></svg>
            </div>
            <div>
                <div class="stat-label">Move Throughput</div>
                <div class="stat-value" id="totalMoves">0</div>
            </div>
        </div>
        <div class="stat-card">
            <div class="stat-icon">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
            </div>
            <div>
                <div class="stat-label">Avg. IPC Latency</div>
                <div class="stat-value" id="avgLatency">0<span style="font-size: 1.2rem; color: var(--text-dim); margin-left: 5px;">ms</span></div>
            </div>
        </div>
        <div class="stat-card">
            <div class="stat-icon">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"></path><path d="M12 5v14"></path></svg>
            </div>
            <div>
                <div class="stat-label">Cluster Uptime</div>
                <div class="stat-value" id="uptime">0s</div>
            </div>
        </div>
    </div>

    <div class="charts-grid">
        <div class="chart-card">
            <div class="chart-header">
                <div class="chart-title">System Throughput</div>
            </div>
            <canvas id="throughputChart"></canvas>
        </div>
        <div class="chart-card">
            <div class="chart-header">
                <div class="chart-title">IPC Response Latency</div>
            </div>
            <canvas id="latencyChart"></canvas>
        </div>
    </div>

    <script>
        const setupChart = (ctx, label, color) => {
            return new Chart(ctx, {
                type: 'line',
                data: {
                    labels: [],
                    datasets: [{
                        label: label,
                        data: [],
                        borderColor: color,
                        backgroundColor: color + '20',
                        fill: true,
                        tension: 0.4,
                        borderWidth: 3,
                        pointRadius: 0
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { 
                            beginAtZero: true,
                            grid: { color: 'rgba(255,255,255,0.05)' },
                            ticks: { color: '#64748b' }
                        },
                        x: { 
                            grid: { display: false },
                            ticks: { color: '#64748b', maxTicksLimit: 10 }
                        }
                    }
                }
            });
        };

        const tChart = setupChart(document.getElementById('throughputChart'), 'Moves', '#6366f1');
        const lChart = setupChart(document.getElementById('latencyChart'), 'ms', '#f472b6');

        let lastMoveCount = 0;

        async function updateData() {
            try {
                const res = await fetch('/metrics');
                const data = await res.json();

                document.getElementById('workerCount').innerText = data.workerCount;
                document.getElementById('roomCount').innerText = data.roomCount;
                document.getElementById('totalMoves').innerText = data.totalMoves;
                document.getElementById('avgLatency').innerHTML = data.averageLatencyMs + '<span style="font-size: 1.2rem; color: var(--text-dim); margin-left: 5px;">ms</span>';
                document.getElementById('uptime').innerText = Math.floor(data.uptime) + 's';

                const now = new Date().toLocaleTimeString();
                const latency = parseFloat(data.averageLatencyMs);
                
                const intervalMoves = data.totalMoves - lastMoveCount;
                lastMoveCount = data.totalMoves;

                if (tChart.data.labels.length > 30) {
                    tChart.data.labels.shift();
                    tChart.data.datasets[0].data.shift();
                }
                tChart.data.labels.push(now);
                tChart.data.datasets[0].data.push(intervalMoves);
                tChart.update('none');

                if (lChart.data.labels.length > 30) {
                    lChart.data.labels.shift();
                    lChart.data.datasets[0].data.shift();
                }
                lChart.data.labels.push(now);
                lChart.data.datasets[0].data.push(latency);
                lChart.update('none');

            } catch (err) {
                console.error("Failed to fetch metrics", err);
            }
        }

        setInterval(updateData, 1000);
        updateData();
    </script>
</body>
</html>
