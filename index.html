<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Play chess online with friends — regular, powered king, and fog of war modes">
  <title>Chess</title>

  <link rel="stylesheet" href="css/style.css">
</head>

<body>

  <div
    style="width: 100%; max-width: 800px; display: flex; justify-content: space-between; align-items: center; position: relative;">
    <div style="width: 40px;"></div> <!-- Spacer for centering -->
    <h1>♔ Chess Multiplayer ♚</h1>
    <button id="darkModeToggle" title="Toggle Dark Mode"
      style="font-size: 1.2rem; padding: 6px 10px; border-radius: 50%; background: transparent; border: none; box-shadow: none;">🌙</button>
  </div>
  <div class="top-panel" id="topPanel">
    <div class="control-group" id="lobbyControls">
      <div class="label">Mode</div>
      <select id="modeSelect">
        <option value="regular">Regular Chess</option>
        <option value="powered-king">Powered King Chess</option>
        <option value="fog-of-war">Fog of War Chess</option>
      </select>
      <button id="queueBtn">Queue</button>
      <button id="cancelQueueBtn" disabled>Cancel</button>
    </div>
    <div class="control-group power-panel" id="powerPanel">
      <div class="label">King Powers</div>
      <button id="powerFreezeBtn">Freeze</button>
      <button id="powerTeleportBtn">Teleport</button>
      <button id="powerSwapBtn">Swap</button>
      <button id="powerCancelBtn">Cancel</button>
      <span class="pill" id="swapsLeftPill">Swaps left: 5</span>
    </div>
  </div>
  <h3 id="status">Connecting...</h3>

  <div id="modalOverlay"
    style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.35); align-items:center; justify-content:center; padding:18px; z-index:1000;">
    <div
      style="width:min(520px, 100%); background:rgba(255,255,255,0.98); border:1px solid rgba(82, 92, 74, 0.18); border-radius:18px; padding:16px 16px; box-shadow:0 24px 60px rgba(0,0,0,0.22);">
      <div style="font-weight:900; font-size:1.05rem; margin-bottom:8px;" id="modalTitle">Confirm</div>
      <div style="color:#2d3b2f; margin-bottom:14px; line-height:1.35;" id="modalMessage"></div>
      <div style="display:flex; gap:10px; justify-content:flex-end;">
        <button id="modalSecondaryBtn">Cancel</button>
        <button id="modalPrimaryBtn">OK</button>
      </div>
    </div>
  </div>

  <div id="promotionOverlay"
    style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.35); align-items:center; justify-content:center; padding:18px; z-index:1050;">
    <div
      style="width:min(520px, 100%); background:rgba(255,255,255,0.98); border:1px solid rgba(82, 92, 74, 0.18); border-radius:18px; padding:16px 16px; box-shadow:0 24px 60px rgba(0,0,0,0.22);">
      <div style="font-weight:900; font-size:1.05rem; margin-bottom:8px;">Choose promotion</div>
      <div style="color:#2d3b2f; margin-bottom:14px; line-height:1.35;">Select the piece your pawn should promote to.
      </div>
      <div style="display:flex; gap:10px; justify-content:flex-end; flex-wrap:wrap;">
        <button class="promotion-btn" data-piece="Q">Queen</button>
        <button class="promotion-btn" data-piece="R">Rook</button>
        <button class="promotion-btn" data-piece="B">Bishop</button>
        <button class="promotion-btn" data-piece="N">Knight</button>
      </div>
    </div>
  </div>

  <div id="endOverlay"
    style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.38); align-items:center; justify-content:center; padding:18px; z-index:1100;">
    <div
      style="width:min(560px, 100%); background:rgba(255,255,255,0.98); border:1px solid rgba(82, 92, 74, 0.18); border-radius:18px; padding:16px 16px; box-shadow:0 24px 60px rgba(0,0,0,0.22);">
      <div style="font-weight:900; font-size:1.15rem; margin-bottom:8px;" id="endTitle">Match ended</div>
      <div style="color:#2d3b2f; margin-bottom:14px; line-height:1.35;" id="endMessage"></div>
      <div style="display:flex; gap:10px; justify-content:flex-end; margin-bottom:12px;">
        <button id="reviewMatchBtn">Review match</button>
      </div>
      <div style="display:flex; flex-wrap:wrap; gap:10px; align-items:center; justify-content:space-between;">
        <div style="display:flex; gap:10px; align-items:center;">
          <div class="label" style="margin-right:2px;">Mode</div>
          <select id="endModeSelect">
            <option value="regular">Regular Chess</option>
            <option value="powered-king">Powered King Chess</option>
            <option value="fog-of-war">Fog of War Chess</option>
          </select>
        </div>
        <div style="display:flex; gap:10px; justify-content:flex-end;">
          <button id="endLobbyBtn">Lobby</button>
          <button id="endRequeueBtn">Requeue</button>
        </div>
      </div>
    </div>
  </div>

  <div id="reviewOverlay"
    style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.45); align-items:center; justify-content:center; padding:18px; z-index:1200;">
    <div
      style="width:min(980px, 100%); background:rgba(255,255,255,0.98); border:1px solid rgba(82, 92, 74, 0.18); border-radius:18px; padding:16px 16px; box-shadow:0 24px 60px rgba(0,0,0,0.22);">
      <div style="display:flex; gap:12px; align-items:center; justify-content:space-between; margin-bottom:10px;">
        <div style="font-weight:900; font-size:1.15rem;">Match review</div>
        <button id="closeReviewBtn">Close</button>
      </div>
      <div style="display:flex; flex-wrap:wrap; gap:16px; align-items:flex-start;">
        <div style="flex: 0 0 auto;">
          <div class="board" id="reviewBoard" style="margin-top:0;"></div>
          <div style="display:flex; gap:10px; justify-content:center; align-items:center; margin-top:12px;">
            <button id="reviewPrevBtn">Prev</button>
            <input id="reviewSlider" type="range" min="0" max="0" value="0" style="width: 360px;">
            <button id="reviewNextBtn">Next</button>
          </div>
          <div id="reviewMeta" style="margin-top:10px; text-align:center; font-weight:700; color:#4e644a;"></div>
        </div>
        <div style="flex: 1 1 320px; min-width: 300px;">
          <div class="label" style="margin-bottom:8px;">Moves</div>
          <div id="reviewMoves"
            style="max-height: 520px; overflow:auto; border:1px solid rgba(82, 92, 74, 0.15); border-radius: 14px; background: rgba(39,45,33,0.04); padding: 10px 10px;">
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="game-area" style="display:flex;">
    <div class="capture-column" style="display:none;">
      <div class="capture-title">White captured</div>
      <div id="whiteCaptured" class="capture-pieces"></div>
      <div id="whiteCapturedScore" class="capture-score">Points: 0</div>
    </div>
    <div class="board-wrapper">
      <div class="board" id="board"></div>
    </div>
    <div class="capture-column" style="display:none;">
      <div class="capture-title">Black captured</div>
      <div id="blackCaptured" class="capture-pieces"></div>
      <div id="blackCapturedScore" class="capture-score">Points: 0</div>
    </div>
  </div>


  <div class="below-board-panel" id="belowBoardActions">
    <div class="control-group" id="gameActions">
      <div class="label">Game</div>
      <button id="offerDrawBtn" disabled>Offer draw</button>
      <button id="resignBtn" disabled>Resign</button>
    </div>
  </div>
  <div id="logs"></div>

  <script src="/socket.io/socket.io.js"></script>

  <script src="js/chess-rules.js"></script>
  <script src="js/moves.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/game.js"></script>
  <script src="js/board.js"></script>

</body>

</html>
